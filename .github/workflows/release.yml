name: Release archive

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run verify:release
      - run: bash scripts/create-release-archive.sh "${GITHUB_REF_NAME}"
      - run: bash scripts/verify-release-archive.sh "${GITHUB_REF_NAME}"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flag="--latest"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_flag="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz" \
            "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz.sha256" \
            --title "BeeMax Agent ${GITHUB_REF_NAME}" \
            "${release_flag}"
