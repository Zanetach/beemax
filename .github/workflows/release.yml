name: Release archive

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: bash scripts/create-release-archive.sh "${GITHUB_REF_NAME}"
      - run: bash scripts/verify-release-archive.sh "${GITHUB_REF_NAME}"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz"
          "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz.sha256"
          --title "BeeMax Agent ${GITHUB_REF_NAME}"
          --prerelease
