name: Release archive

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: bash scripts/install-media-dependencies.sh
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run verify:release
      - run: mkdir -p artifacts && npm run eval:deployment -- --require-ubuntu --write artifacts/agent-deployment-ubuntu.json
      - run: mkdir -p artifacts && npm run eval:resources:ubuntu -- --write artifacts/resource-high-water-ubuntu.json
      - run: npm run eval:sandbox:ubuntu -- --write artifacts/docker-sandbox-ubuntu.json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-deployment-ubuntu-${{ github.ref_name }}
          path: artifacts/agent-deployment-ubuntu.json
      - uses: actions/upload-artifact@v4
        with:
          name: resource-high-water-ubuntu-${{ github.ref_name }}
          path: artifacts/resource-high-water-ubuntu.json
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sandbox-ubuntu-${{ github.ref_name }}
          path: artifacts/docker-sandbox-ubuntu.json
      - run: bash scripts/create-release-archive.sh "${GITHUB_REF_NAME}"
      - run: bash scripts/verify-release-archive.sh "${GITHUB_REF_NAME}"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flag="--latest"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_flag="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz" \
            "dist/release/beemax-${GITHUB_REF_NAME}.tar.gz.sha256" \
            --title "BeeMax Agent ${GITHUB_REF_NAME}" \
            "${release_flag}"
