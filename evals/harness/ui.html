<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeeMax Eval 控制台</title>
<style>
	:root {
		--bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
		--text: #d7dae0; --muted: #8a919e; --accent: #f5b301; --accent-dim: #8a6a00;
		--pass: #3fb950; --fail: #f85149; --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
	}
	* { box-sizing: border-box; }
	body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
	header { display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
	header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; }
	header h1 span { color: var(--accent); }
	#save-state { font-size: 12px; color: var(--muted); }
	#save-state.dirty { color: var(--accent); }
	main { display: grid; grid-template-columns: 230px minmax(340px, 1fr) minmax(420px, 1.1fr); gap: 12px; padding: 12px 18px; height: calc(100vh - 49px); }
	.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
	.panel > h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0; padding: 10px 12px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
	.panel > h2 .spacer { flex: 1; }
	button { background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12.5px; cursor: pointer; }
	button:hover { border-color: var(--accent-dim); }
	button.primary { background: var(--accent); color: #1a1400; border-color: var(--accent); font-weight: 600; }
	button.primary:disabled { background: var(--accent-dim); cursor: not-allowed; color: #333; }
	button.small { padding: 2px 8px; font-size: 11.5px; }
	#case-list { overflow-y: auto; flex: 1; }
	.case-item { padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
	.case-item:hover { background: var(--panel2); }
	.case-item.selected { background: var(--panel2); border-left: 3px solid var(--accent); padding-left: 9px; }
	.case-item .cid { font-family: var(--mono); font-size: 12.5px; display: flex; align-items: center; gap: 6px; }
	.case-item .cdesc { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
	.badge { display: inline-block; min-width: 8px; height: 8px; border-radius: 50%; }
	.badge.pass { background: var(--pass); } .badge.fail { background: var(--fail); } .badge.none { background: var(--border); }
	#editor { flex: 1; display: flex; flex-direction: column; min-height: 0; }
	#case-json { flex: 1; width: 100%; resize: none; background: var(--bg); color: var(--text); border: none; outline: none; padding: 12px; font: 12.5px/1.55 var(--mono); tab-size: 2; }
	#editor-msg { padding: 6px 12px; font-size: 12px; min-height: 28px; border-top: 1px solid var(--border); color: var(--muted); font-family: var(--mono); }
	#editor-msg.err { color: var(--fail); } #editor-msg.ok { color: var(--pass); }
	.run-controls { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); font-size: 12.5px; }
	.run-controls label { display: flex; align-items: center; gap: 5px; color: var(--muted); }
	.run-controls input[type=text], .run-controls select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12.5px; min-width: 130px; }
	#log { flex: 1; min-height: 90px; max-height: 34%; overflow-y: auto; background: var(--bg); margin: 0; padding: 10px 12px; font: 11.5px/1.5 var(--mono); color: #a8b3c4; white-space: pre-wrap; word-break: break-all; border-bottom: 1px solid var(--border); }
	#results { flex: 2; overflow-y: auto; padding: 8px 12px; }
	.summary { font-size: 13px; margin: 6px 0 10px; }
	.summary b.pass { color: var(--pass); } .summary b.fail { color: var(--fail); }
	.result { border: 1px solid var(--border); border-radius: 7px; margin-bottom: 8px; background: var(--panel2); }
	.result > .head { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; }
	.result .rid { font-family: var(--mono); font-size: 12.5px; }
	.result .tools { margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; }
	.chip { font: 10.5px var(--mono); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; color: var(--muted); }
	.result .body { display: none; border-top: 1px solid var(--border); padding: 8px 10px; font-size: 12.5px; }
	.result.open .body { display: block; }
	.result .body ul { margin: 4px 0; padding-left: 18px; color: var(--fail); }
	.result .body .judge { color: var(--muted); font-size: 12px; margin-top: 4px; }
	.result .body pre { background: var(--bg); border-radius: 6px; padding: 8px; font: 11.5px/1.5 var(--mono); white-space: pre-wrap; word-break: break-word; max-height: 180px; overflow-y: auto; }
	.hint { color: var(--muted); font-size: 12px; padding: 10px 12px; }
</style>
</head>
<body>
<header>
	<h1>🐝 BeeMax <span>Eval</span> 控制台</h1>
	<span id="save-state">已同步</span>
	<span style="flex:1"></span>
	<button id="btn-reload">重新加载 baseline</button>
	<button id="btn-save" class="primary">保存到文件</button>
</header>
<main>
	<section class="panel">
		<h2>测试用例 <span class="spacer"></span>
			<button class="small" id="btn-add">新增</button>
			<button class="small" id="btn-dup">复制</button>
			<button class="small" id="btn-del">删除</button>
		</h2>
		<div id="case-list"></div>
	</section>

	<section class="panel" id="editor">
		<h2>用例编辑(JSON)<span class="spacer"></span><button class="small" id="btn-apply">应用修改</button></h2>
		<textarea id="case-json" spellcheck="false"></textarea>
		<div id="editor-msg">选择左侧用例进行编辑;“应用修改”写入内存,“保存到文件”落盘。</div>
	</section>

	<section class="panel">
		<h2>运行与结果</h2>
		<div class="run-controls">
			<label>模式
				<select id="run-mode">
					<option value="live">live(真实 Agent)</option>
					<option value="offline">offline(已有记录)</option>
				</select>
			</label>
			<label id="wrap-profile">Profile <input type="text" id="run-profile" placeholder="eval" list="profile-options"><datalist id="profile-options"></datalist></label>
			<label id="wrap-records" style="display:none">记录文件 <input type="text" id="run-records" placeholder="evals/harness/out/session-records.jsonl" style="min-width:260px"></label>
			<label><input type="checkbox" id="run-skipjudge"> 跳过 LLM judge</label>
			<button class="primary" id="btn-run">▶ 运行 Eval</button>
		</div>
		<pre id="log">(日志会显示在这里)</pre>
		<div id="results"><div class="hint">还没有报告。运行一次 eval,或点击 <button class="small" id="btn-report">加载上次报告</button></div></div>
	</section>
</main>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let baseline = null;
let selectedId = null;
let dirty = false;
let lastResults = new Map();
let logCursor = 0;
let polling = false;

const CASE_TEMPLATE = {
	id: "new-case",
	description: "描述这个用例考察什么",
	prompt: "在这里写发给 Agent 的问题",
	expect: {
		tools: { required: [], forbidden: [] },
		output: { anyContain: [], example: "参考答案(LLM judge 用来对比语义等价性)" },
		maxToolCalls: 4,
	},
};

function setDirty(value) {
	dirty = value;
	const el = $("save-state");
	el.textContent = value ? "● 有未保存的修改" : "已同步";
	el.className = value ? "dirty" : "";
}

function msg(text, cls) {
	const el = $("editor-msg");
	el.textContent = text;
	el.className = cls || "";
}

function renderList() {
	const list = $("case-list");
	list.innerHTML = "";
	for (const c of baseline.cases) {
		const item = document.createElement("div");
		item.className = "case-item" + (c.id === selectedId ? " selected" : "");
		const result = lastResults.get(c.id);
		const badge = result === undefined ? "none" : result.passed ? "pass" : "fail";
		item.innerHTML = `<div class="cid"><span class="badge ${badge}"></span>${escapeHtml(c.id)}${c.dependsOn ? ` <span class="chip">← ${escapeHtml(c.dependsOn)}</span>` : ""}</div><div class="cdesc">${escapeHtml(c.description || c.prompt || "")}</div>`;
		item.onclick = () => selectCase(c.id);
		list.appendChild(item);
	}
}

function selectCase(id) {
	selectedId = id;
	const c = baseline.cases.find((x) => x.id === id);
	$("case-json").value = c ? JSON.stringify(c, null, 2) : "";
	renderList();
	msg(c ? `正在编辑:${id}` : "");
}

function applyCase() {
	try {
		const parsed = JSON.parse($("case-json").value);
		if (!parsed.id || typeof parsed.id !== "string") throw new Error("case 必须有字符串 id");
		const index = baseline.cases.findIndex((x) => x.id === selectedId);
		if (index === -1) throw new Error("先在左侧选择一个用例");
		if (parsed.id !== selectedId && baseline.cases.some((x) => x.id === parsed.id)) throw new Error(`id 已存在:${parsed.id}`);
		baseline.cases[index] = parsed;
		selectedId = parsed.id;
		setDirty(true);
		renderList();
		msg("已应用到内存(尚未保存到文件)", "ok");
	} catch (error) {
		msg(`JSON 无效:${error.message}`, "err");
	}
}

async function loadBaseline() {
	const response = await fetch("/api/baseline");
	baseline = await response.json();
	setDirty(false);
	selectedId = baseline.cases[0]?.id ?? null;
	renderList();
	if (selectedId) selectCase(selectedId);
}

async function saveBaseline() {
	try {
		const response = await fetch("/api/baseline", { method: "PUT", headers: { "content-type": "application/json" }, body: JSON.stringify(baseline) });
		const payload = await response.json();
		if (!response.ok) throw new Error(payload.error || response.statusText);
		setDirty(false);
		msg(`已保存 ${payload.cases} 个用例到 baseline-cases.json`, "ok");
	} catch (error) {
		msg(`保存失败:${error.message}`, "err");
	}
}

function addCase(template) {
	const base = template ?? CASE_TEMPLATE;
	const copy = JSON.parse(JSON.stringify(base));
	let id = copy.id;
	let n = 2;
	while (baseline.cases.some((x) => x.id === id)) id = `${copy.id}-${n++}`;
	copy.id = id;
	baseline.cases.push(copy);
	setDirty(true);
	selectCase(id);
}

function deleteCase() {
	const index = baseline.cases.findIndex((x) => x.id === selectedId);
	if (index === -1) return;
	if (!confirm(`删除用例 ${selectedId}?`)) return;
	baseline.cases.splice(index, 1);
	setDirty(true);
	selectedId = baseline.cases[Math.min(index, baseline.cases.length - 1)]?.id ?? null;
	renderList();
	if (selectedId) selectCase(selectedId); else $("case-json").value = "";
}

async function startRun() {
	if (dirty && !confirm("baseline 有未保存的修改,运行会使用磁盘上的旧版本。继续?")) return;
	const mode = $("run-mode").value;
	const body = { mode, skipJudge: $("run-skipjudge").checked };
	if (mode === "live") body.profile = $("run-profile").value.trim();
	else body.records = $("run-records").value.trim();
	const response = await fetch("/api/run", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
	const payload = await response.json();
	if (!response.ok) { appendLog([`[ui] 启动失败:${payload.error}`]); return; }
	$("log").textContent = "";
	logCursor = 0;
	$("btn-run").disabled = true;
	poll();
}

function appendLog(lines) {
	if (!lines.length) return;
	const el = $("log");
	el.textContent += lines.join("\n") + "\n";
	el.scrollTop = el.scrollHeight;
}

async function poll() {
	if (polling) return;
	polling = true;
	try {
		while (true) {
			const response = await fetch(`/api/status?since=${logCursor}`);
			const status = await response.json();
			appendLog(status.lines);
			logCursor = status.next;
			if (!status.running && status.finishedAt) break;
			if (!status.running && !status.startedAt) break;
			await new Promise((r) => setTimeout(r, 700));
		}
	} finally {
		polling = false;
		$("btn-run").disabled = false;
		await loadReport();
	}
}

async function loadReport() {
	const response = await fetch("/api/report");
	if (!response.ok) return;
	const { report, updatedAt } = await response.json();
	lastResults = new Map(report.results.map((result) => [result.id, result]));
	renderList();
	const container = $("results");
	const ok = report.passed === report.total;
	container.innerHTML = `<div class="summary">最近报告(${new Date(updatedAt).toLocaleString()} · ${escapeHtml(report.judge)}):<b class="${ok ? "pass" : "fail"}"> ${report.passed}/${report.total} 通过</b></div>`;
	for (const result of report.results) {
		const div = document.createElement("div");
		div.className = "result";
		const tools = (result.toolCalls ?? []).map((name) => `<span class="chip">${escapeHtml(name)}</span>`).join("");
		const judge = result.judge ? (result.judge.skipped ? `judge 跳过:${escapeHtml(result.judge.reason)}` : `judge:${result.judge.equivalent ? "等价" : "不等价"} · 得分 ${result.judge.score}/10 · ${escapeHtml(result.judge.reasoning ?? "")}`) : "judge 未运行";
		div.innerHTML = `
			<div class="head"><span class="badge ${result.passed ? "pass" : "fail"}"></span><span class="rid">${escapeHtml(result.id)}</span><div class="tools">${tools}</div></div>
			<div class="body">
				${result.failures?.length ? `<ul>${result.failures.map((failure) => `<li>${escapeHtml(failure)}</li>`).join("")}</ul>` : `<div style="color:var(--pass)">全部检查通过</div>`}
				<div class="judge">${judge}</div>
				${result.output ? `<pre>${escapeHtml(result.output)}</pre>` : ""}
			</div>`;
		div.querySelector(".head").onclick = () => div.classList.toggle("open");
		container.appendChild(div);
	}
}

async function loadProfiles() {
	const response = await fetch("/api/profiles");
	const { profiles } = await response.json();
	$("profile-options").innerHTML = profiles.map((name) => `<option value="${escapeHtml(name)}">`).join("");
	if (profiles.length && !$("run-profile").value) $("run-profile").value = profiles[0];
}

function escapeHtml(value) {
	return String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
}

$("btn-reload").onclick = () => { if (!dirty || confirm("放弃未保存的修改并重新加载?")) loadBaseline(); };
$("btn-save").onclick = saveBaseline;
$("btn-apply").onclick = applyCase;
$("btn-add").onclick = () => addCase();
$("btn-dup").onclick = () => { const c = baseline.cases.find((x) => x.id === selectedId); if (c) addCase(c); };
$("btn-del").onclick = deleteCase;
$("btn-run").onclick = startRun;
$("btn-report").onclick = loadReport;
$("run-mode").onchange = () => {
	const live = $("run-mode").value === "live";
	$("wrap-profile").style.display = live ? "" : "none";
	$("wrap-records").style.display = live ? "none" : "";
};
window.addEventListener("beforeunload", (event) => { if (dirty) event.preventDefault(); });

loadBaseline();
loadProfiles();
loadReport();
poll();
</script>
</body>
</html>
